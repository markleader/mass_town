[workspace]
name = "mass-town"
version = "0.1.0"
description = "Prototype workflow supervision system for engineering pipelines."
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.11,<3.13"
pip = "*"

[pypi-dependencies]
mass-town = { path = ".", editable = true }
pytest = ">=8.0"

[feature.mdao.pypi-dependencies]
openmdao = ">=3.30"

[feature.fea.pypi-dependencies]
gmsh = ">=4.13"
imageio = ">=2.34"
# Optional local editable install for a sibling TACS checkout.
# Uncomment if your layout is:
#   ~/git/mass_town
#   ~/git/tacs
tacs = { path = "../tacs", editable = true }

[feature.fea.tasks]
install-local-tacs = "python -m pip install -e \"${TACS_DIR:-$HOME/git/tacs}\""
test-fea-baseline = "python -m pytest tests/test_phase0_baseline.py -q"
test-shell-bdf-example = "python -m pytest tests/test_shell_sizing_bdf_example.py -q"
test-shell-bdf-multi-case-example = "python -m pytest tests/test_shell_sizing_bdf_multi_case_example.py -q"
test-shell-buckling-bdf-example = "python -m pytest tests/test_shell_buckling_bdf_example.py -q"
test-shell-modal-bdf-example = "python -m pytest tests/test_shell_modal_bdf_example.py -q"
test-solid-cantilever-example = "python -m pytest tests/test_solid_cantilever_example.py -q"
test-shell-cantilever-example = "python -m pytest tests/test_shell_cantilever_example.py -q"
test-shell-vs-solid-cantilever = "python -m pytest tests/test_shell_vs_solid_cantilever_compare.py -q"

[feature.topopt.pypi-dependencies]
numpy = ">=1.26"
scipy = ">=1.13"
matplotlib = ">=3.8"

[feature.topopt.tasks]
test-topology = "python -m pytest tests/test_topology.py -q"
test-topology-example = "python -m pytest tests/test_topology.py -q -k example"

[environments]
default = { features = [] }
mdao = { features = ["mdao"] }
fea = { features = ["mdao", "fea"] }
topopt = { features = ["topopt"] }

[tasks]
test = "python -m pytest"
run-core-status = "python -m mass_town.cli status examples/simple_structural_problem/design_state.yaml"
run-fea-example = "python -m mass_town.cli run examples/simple_structural_problem"
run-shell-bdf-example = "python -m mass_town.cli run examples/shell_sizing_bdf_problem"
run-shell-bdf-multi-case-example = "python -m mass_town.cli run examples/shell_sizing_bdf_multi_case_problem"
run-shell-buckling-bdf-example = "python -m mass_town.cli run examples/shell_buckling_bdf_problem"
run-shell-modal-bdf-example = "python -m mass_town.cli run examples/shell_modal_bdf_problem"
run-solid-cantilever-example = "python -m mass_town.cli run examples/solid_cantilever_problem"
run-shell-cantilever-example = "python -m mass_town.cli run examples/shell_cantilever_problem"
run-topology-example = "python -m mass_town.cli run examples/topology_cantilever_problem"
run-example = "python -m mass_town.cli run examples/simple_structural_problem"
